name: Build from Upstream Master

on:
#  schedule:
#   - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout upstream code
        uses: actions/checkout@v4
        with:
          repository: 'piratecash/corsa'
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release tag from upstream repo
        id: get_release
        run: |
          api_url="https://api.github.com/repos/piratecash/corsa/releases/latest"
          echo "Fetching $api_url"
          resp=$(curl -sSL -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "$api_url")
          tag=$(echo "$resp" | jq -r '.tag_name // empty')
          if [ -z "$tag" ]; then
            # fallback to branch name if no releases
            branch=$(git rev-parse --abbrev-ref HEAD || echo "master")
            tag="branch-$branch"
          fi
          # sanitize tag (remove leading 'v' if desired) — uncomment if needed:
          # tag=${tag#v}
          echo "release_tag=$tag" >> $GITHUB_OUTPUT
      
      # Собираем образ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/corsa-node:${{ steps.get_release.outputs.release_tag }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/corsa-node:latest
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/corsa
            docker compose pull
            docker compose up -d --force-recreate
